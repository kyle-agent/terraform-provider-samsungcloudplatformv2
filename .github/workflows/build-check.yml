# Lightweight compile + format check for iterating on provider fixes from a
# branch (local builds can't fetch the private SDK; CI has GH_ACCESS_TOKEN).
name: build-check
on:
  push:
    branches:
      - 'claude/**'
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/SamsungSDSCloud/terraform-sdk-samsungcloudplatformv2
      GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Config Access Token
        run: git config --global url.https://$GH_ACCESS_TOKEN@github.com/.insteadOf https://github.com/
      - name: gofmt
        run: |
          fmtout="$(gofmt -l samsungcloudplatform)"
          if [ -n "$fmtout" ]; then echo "gofmt needed on:"; echo "$fmtout"; exit 1; fi
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./... || true
